# Configurable datetime formats
datetime_formats:
    sensor: '%m/%d/%Y %H:%M:%S'
    aim: '%d.%m.%Y %H:%M'
    palm: '%Y-%m-%d %H:%M:%S +00'

# Name of the variables for loading from files
variable_names:
    sensor:
        'NO': 'NO_'
        NO2:  'NO2_'
        PM25: 'PM2_5_'
        PM10: 'PM10_'
        O3:   'O3_'
        PM10b: 'PM10_'
        PM10sp: 'PM10_'
        PM10all: 'PM10_'
    aim:
        'NO': 'NO'
        NO2:  'NO2'
        PM25: 'PM2_5'
        PM10: 'PM10'
        O3:   'O3'
        NOx:  'NOx'
        PM10b: 'PM10'
        PM10sp: 'PM10'
        PM10all: 'PM10'
    palm:
        'NO': 'kc_NO'
        NO2:  'kc_NO2'
        PM25: 'kc_PM25'
        PM10: 'kc_PM10'
        O3:   'kc_O3'
        NOx:  'kc_NOx'
        PM10b: 'kc_PM10b'
        PM10all: 'PM10'
    passive:
        'NO': 'NO'
        NO2:  'NO2'
        PM25: 'PM25'
        PM10: 'PM10'
        O3:   'O3'
        PM10b: 'PM10'
        PM10sp: 'PM10'
        PM10all: 'PM10'
    cams:
        'NO': 'no_conc'
        NO2:  'no2_conc'
        PM25: 'pm2p5_conc'
        PM10: 'pm10_conc'
        O3:   'o3_conc'
        PM10b: 'pm10_conc'
        PM10sp: 'pm10_conc'
        PM10all: 'pm10_conc'

# conversion factor for chemical species
units_conversion:
    sensor:
        'NO':   1.0       # ppb
        NO2:    1.0       # ppb
        PM25:   1.0       # ug / m3
        PM10:   1.0       # ug / m3
        O3:     1.0       # ppb
        PM10b:  1.0
        PM10sp: 1.0
        PM10all: 1.0
    aim:
        'NO':   1.0     # ppb
        NO2:    1.0     # ppb
        PM25:   1.0     # ug / m3
        PM10:   1.0     # ug / m3
        O3:     1.0     # ppb
        NOx:    1.0     # ppb
        PM10b:  1.0
        PM10sp: 1.0
        PM10all: 1.0
    palm:
        'NO': 1000.0      # ppm -> ppb
        NO2:  1000.0      # ppm -> ppb
        PM25: 1000000000  # kg/m3 -> ug / m3
        PM10: 1000000000  # kg/m3 -> ug / m3
        O3:   1000.0      # ppm -> ppb
        NOx:  1.0         # ppb
        PM10b: 1000000000
        PM10sp: 1000000000
        PM10all: 1.0
    passive:
        'NO':   0.8012  # ug / m3 -> ppb
        NO2:    0.5228  # ug / m3 -> ppb
        PM25:   1.0     # ug / m3
        PM10:   1.0     # ug / m3
        O3:     0.5010  # ug / m3 -> ppb
        PM10b:  1.0
        PM10sp: 1.0
    cams:
        'NO': 0.8012   # ug / m3 -> ppb
        NO2:  0.5228   # ug / m3 -> ppb
        PM25: 1.0      # ug / m3
        PM10: 1.0      # ug / m3
        O3:   0.5010  # ug / m3 -> ppb
        PM10b: 1.0
        PM10sp: 1.0
        PM10all: 1.0

# plotting configuration
plotting:
    path: plots_first_test
    show_plots: True
    leg_cols: 2
    hourlocator: 6
    sunrise_sunset: True
    var_labels:
        'NO': 'NO / ppb' #$\mathrm{\mu g\,m}^{-3}$'
        NO2:  'NO2 / ppb' # $\mathrm{\mu g\,m}^{-3}$'
        PM10: 'PM10 / $\mathrm{\mu g\,m}^{-3}$'
        PM25: 'PM2.5 / $\mathrm{\mu g\,m}^{-3}$'
        PM1:  'PM1.0 / $\mathrm{\mu g\,m}^{-3}$'
        O3:  'O3 / ppb' # $\mathrm{\mu g\,m}^{-3}$'
        NOx: 'NOX / ppb' # / $\mathrm{\mu g\,m}^{-3}$'
        PM10b: 'PM10 (PM10b) / $\mathrm{\mu g\,m}^{-3}$'
        PM10-2.5: 'PM10 - PM2.5 / $\mathrm{\mu g\,m}^{-3}$'
        PM10sp: 'PM10 - PM10sp / $\mathrm{\mu g\,m}^{-3}$'
        PM10all: 'PM10 / $\mathrm{\mu g\,m}^{-3}$'
        e: 'e [$\mathrm{m^{2} \, s^{-2}}$]'
        tke: 'TKE [$\mathrm{m^{2} \, s^{-2}}$]'
        tke_res: 'TKE resolved [$\mathrm{m^{2} \, s^{-2}}$]'
        ws: 'WS [$\mathrm{m \, s^{-1}}$]'
        
    ylims:
        'NO': 150.0
        NO2: 120.0
        NOx: 150.0
        PM10: 50.0
        PM25: 125.0
        PM10b: 125.0
        PM10-2.5: 125.0
        O3: 100.0
        PM1: 100.0
        PM10sp: 100.0
        PM10all: 100.0
        e: 0.2
        tke: 1.0
        tke_res: 1.0
        ws: 2.0
        

